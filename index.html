// ── State ──
let mode = 'all';
let queue = [];
let cur = 0;
let answered = false;
let correct = 0;
let wrong = 0;
let wrongIds = new Set();
let streak = 0;
let startTime = 0;
let timerInterval = null;
let showTimer = true;
let elapsedSec = 0;

// ── Persistent stats ──
let stats = JSON.parse(localStorage.getItem('ins_stats') || '{"done":0,"correct":0,"wrong":{}}');
function saveStats(){ localStorage.setItem('ins_stats', JSON.stringify(stats)); }

// ── Home ──
function updateHomeStats(){
  const done = stats.done;
  const acc = done > 0 ? Math.round(stats.correct/done*100)+'%' : '—';
  document.getElementById('statDone').textContent = done;
  document.getElementById('statAcc').textContent = acc;
  const wrongCount = Object.keys(stats.wrong).length;
  document.getElementById('modeWrong').innerHTML =
    `<span class="mode-icon">❌</span>錯題複習${wrongCount>0?' ('+wrongCount+')':''}`;
}
updateHomeStats();

function selectMode(m){
  mode = m;
  ['all','wrong','random','custom'].forEach(id=>{
    document.getElementById('mode'+id.charAt(0).toUpperCase()+id.slice(1))
      .classList.toggle('selected', id===m);
  });
  document.getElementById('customInput').style.display = m==='custom'?'block':'none';
}

function startQuiz(){
  let pool = [...ALL_QS];

  if(mode === 'wrong'){
    const wids = Object.keys(stats.wrong).map(Number);
    pool = ALL_QS.filter(q => wids.includes(q.id));
    if(pool.length === 0){ alert('目前還沒有錯題！請先完成一輪練習。'); return; }
  } else if(mode === 'random'){
    pool = shuffle([...ALL_QS]).slice(0,50);
  } else if(mode === 'custom'){
    const n = Math.min(419, Math.max(1, parseInt(document.getElementById('customCount').value)||30));
    pool = shuffle([...ALL_QS]).slice(0,n);
  }

  const doShuffle = document.getElementById('toggleShuffle').classList.contains('on');
  showTimer = document.getElementById('toggleTimer').classList.contains('on');

  queue = doShuffle ? shuffle(pool) : pool;
  cur = 0; correct = 0; wrong = 0; wrongIds = new Set(); streak = 0;

  startTime = Date.now(); elapsedSec = 0;
  if(showTimer){
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 1000);
    document.getElementById('timerDisplay').style.display='flex';
  } else {
    document.getElementById('timerDisplay').style.display='none';
  }

  document.getElementById('headerBadge').style.display='flex';
  showScreen('quizScreen');
  renderQuestion();
}

// ── Timer ──
function updateTimer(){
  elapsedSec = Math.floor((Date.now()-startTime)/1000);
  const m = String(Math.floor(elapsedSec/60)).padStart(2,'0');
  const s = String(elapsedSec%60).padStart(2,'0');
  document.getElementById('timerDisplay').textContent = m+':'+s;
}
function fmtTime(sec){
  if(sec < 60) return sec+'秒';
  return Math.floor(sec/60)+'分'+sec%60+'秒';
}

// ── Quiz ──
function renderQuestion(){
  const q = queue[cur];
  const total = queue.length;
  answered = false;

  document.getElementById('progressFill').style.width = (cur/total*100)+'%';
  document.getElementById('qMeta').textContent = `第 ${cur+1} / ${total} 題`;
  document.getElementById('qScore').textContent =
    cur>0 ? `✓${correct} ✗${wrong}` : '';
  document.getElementById('headerBadge').textContent =
    `${cur+1}/${total}`;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  (q.options || []).forEach((opt, i) => {
    if(!opt) return;
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-num">(${i+1})</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i, btn);
    container.appendChild(btn);
  });

  document.getElementById('explainCard').style.display = 'none';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('nextBtn').textContent =
    cur === queue.length-1 ? '查看結果' : '下一題';
  document.getElementById('skipBtn').disabled = false;
}

function selectOption(idx, btn){
  if(answered) return;
  answered = true;

  const q = queue[cur];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  if(idx === q.answer){
    btn.classList.add('correct');
    correct++;
    streak++;
    stats.correct++;
    delete stats.wrong[q.id];
    if(streak >= 5) showStreak(streak);
  } else {
    btn.classList.add('wrong');
    btns[q.answer].classList.add('reveal');
    wrong++;
    streak = 0;
    stats.wrong[q.id] = true;
  }

  stats.done++;
  saveStats();
  updateHomeStats();

  document.getElementById('nextBtn').disabled = false;
  document.getElementById('skipBtn').disabled = true;
}

function skipQuestion(){
  streak = 0;
  cur++;
  if(cur >= queue.length){ showResult(); return; }
  renderQuestion();
}

function nextQuestion(){
  cur++;
  if(cur >= queue.length){ showResult(); return; }
  renderQuestion();
}

// ── Result ──
function showResult(){
  clearInterval(timerInterval);
  const total = queue.length;
  const pct = Math.round(correct/total*100);
  const pass = pct >= 70;

  document.getElementById('resultCircle').textContent = pct+'%';
  document.getElementById('resultCircle').className = 'result-circle '+(pass?'pass':'fail');
  document.getElementById('resultTitle').textContent = pass ? '🎉 通過！' : '繼續加油！';
  document.getElementById('resultSub').textContent =
    `答對 ${correct} 題，共 ${total} 題 · 正確率 ${pct}%`;
  document.getElementById('rsCorrect').textContent = correct;
  document.getElementById('rsWrong').textContent = wrong;
  document.getElementById('rsTime').textContent = fmtTime(elapsedSec);

  showScreen('resultScreen');
}

function reviewWrong(){
  const wqs = queue.filter(q => wrongIds.has(q.id) || stats.wrong[q.id]);
  // Build review from this session's wrong answers
  const sessionWrong = queue.filter((q,i) => {
    // Re-check by looking at stats
    return stats.wrong[q.id];
  });
  buildReview(queue.filter((_,i)=>i<cur+1)); // show all answered
  showScreen('reviewScreen');
}

function buildReview(qs){
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  qs.forEach(q => {
    const wasWrong = stats.wrong[q.id];
    const item = document.createElement('div');
    item.className = 'review-item';
    item.style.borderLeft = `4px solid ${wasWrong?'var(--red)':'var(--green)'}`;

    let html = `<div class="q-text">${q.text}</div>`;
    q.options.forEach((opt,i) => {
      const isAns = i === q.answer;
      html += `<div class="review-opt ${isAns?'correct':''}">(${i+1}) ${opt}</div>`;
    });
    item.innerHTML = html;
    list.appendChild(item);
  });
}

function retryWrong(){
  const wids = Object.keys(stats.wrong).map(Number);
  const pool = ALL_QS.filter(q => wids.includes(q.id));
  if(pool.length === 0){ alert('目前沒有錯題！'); return; }
  selectMode('wrong');
  startQuiz();
}

function goHome(){
  clearInterval(timerInterval);
  document.getElementById('headerBadge').style.display='none';
  document.getElementById('timerDisplay').style.display='none';
  document.getElementById('headerTitle').textContent = '人身保險 刷題';
  updateHomeStats();
  showScreen('homeScreen');
}

// ── Streak ──
function showStreak(n){
  const el = document.getElementById('streakToast');
  document.getElementById('streakNum').textContent = n;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// ── Utils ──
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
